<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Photo Gallery Engine</title>
    <link rel="stylesheet" href="styles/gallery.css">
</head>

<body>
    <button id="menu-toggle" aria-label="Toggle Menu">☰</button>

    <aside id="sidebar">
        <h2>Albums</h2>
        <nav id="album-nav"></nav>
    </aside>

    <header class="site-header">
        <h1>Photo Gallery Engine</h1>
    </header>
    <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>

    <div class="album-toolbar">
        <input type="search" id="album-search" placeholder="Search albums..." aria-label="Search albums">
    </div>
    
    <main id="album-container" class="album-grid"></main>

    <script src="scripts/transition.js"></script>
    <script src="scripts/navigation-memory.js"></script>
    <script src="scripts/theme.js"></script>
    <script src="scripts/menu.js"></script>
    
    <!-- 1) photos first -->
    <script src="data/photos.js"></script>
    
    <!-- 2) then albums (depends on photos) -->
    <script src="data/albums.js"></script>
    
    <!-- 3) then scripts that use albums -->
    <script src="scripts/sidebar.js"></script>
    <script src="scripts/gallery.js"></script>
</body>

</html>
